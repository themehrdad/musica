name: Musica
options:
  bundleIdPrefix: com.musica
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: "Automatic"

targets:
  Musica:
    type: application
    platform: iOS
    sources:
      - path: Musica
    settings:
      base:
        INFOPLIST_FILE: Musica/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.musica.app
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: AudioKit
      - package: AudioKitEX
      - package: SoundpipeAudioKit

  MusicaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MusicaTests
    dependencies:
      - target: Musica
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Musica.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Musica"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Musica:
    build:
      targets:
        Musica: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MusicaTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  AudioKit:
    url: https://github.com/AudioKit/AudioKit.git
    from: "5.6.0"
  AudioKitEX:
    url: https://github.com/AudioKit/AudioKitEX
    from: "5.5.0"
  SoundpipeAudioKit:
    url: https://github.com/AudioKit/SoundpipeAudioKit.git
    from: "5.6.0"
